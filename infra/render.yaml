# Render reference config (PRD 30).
#
# The preferred production shape for this repo is one Docker web service plus
# managed Postgres:
# - Next.js listens on Render's public $PORT.
# - FastAPI listens privately on 127.0.0.1:8000 inside the same container.
# - Next rewrites /api/* to the private FastAPI process via BACKEND_URL.
#
# The project is provisioned manually in Render; this file documents the same
# settings for review or future Blueprint use.

databases:
  - name: financial-atlas-db
    plan: free
    diskSizeGB: 1
    databaseName: atlas

services:
  - type: web
    name: financial-atlas
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /login
    disk:
      name: disk
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: financial-atlas-db
          property: connectionString
      - key: BACKEND_URL
        value: http://127.0.0.1:8000
      - key: ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: CACHE_DIR
        value: /var/data/cache
      - key: CACHE_MAX_MB
        value: 512
      - key: CACHE_MIN_FREE_MB
        value: 128
      - key: SEC_USER_AGENT
        sync: false
      - key: AUTH_USERNAME
        value: admin
      - key: AUTH_PASSWORD
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: AUTH_SESSION_TTL_SECONDS
        value: 604800
      - key: ASSISTANT_RATE_LIMIT_PER_MINUTE
        value: 20
      - key: PAPER_TRADING_RATE_LIMIT_PER_MINUTE
        value: 240
      - key: AUTH_RATE_LIMIT_PER_MINUTE
        value: 12
      - key: OPENAI_API_KEY
        sync: false
      - key: FMP_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
